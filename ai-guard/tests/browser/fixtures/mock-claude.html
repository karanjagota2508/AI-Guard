<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Guard Browser Fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f7f3ea;
        color: #231f1b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(229, 106, 62, 0.12), transparent 28%),
          linear-gradient(180deg, #faf7ef 0%, #f1ece4 100%);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 56px 24px 80px;
      }

      .headline {
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
        margin: 0 0 12px;
      }

      .subhead {
        max-width: 640px;
        margin: 0 0 28px;
        color: #695f54;
        font-size: 1rem;
      }

      .composer {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(100, 88, 77, 0.16);
        border-radius: 28px;
        box-shadow: 0 28px 64px rgba(41, 29, 18, 0.08);
        overflow: hidden;
      }

      .editor {
        min-height: 180px;
        padding: 26px 28px 20px;
        outline: none;
        font-size: 1.05rem;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .editor:empty::before {
        content: attr(data-placeholder);
        color: #988d80;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 18px 18px;
        border-top: 1px solid rgba(100, 88, 77, 0.08);
      }

      .pill {
        padding: 9px 14px;
        border-radius: 999px;
        background: #f5efe7;
        color: #54473a;
        font-size: 0.9rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #d7673a;
        color: #fff;
        padding: 12px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .submitted {
        margin-top: 24px;
        padding: 18px 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(100, 88, 77, 0.12);
      }

      .submitted strong {
        display: block;
        margin-bottom: 8px;
      }

      .submitted-output {
        min-height: 22px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="headline">AI Guard local browser fixture</h1>
      <p class="subhead">
        This test-only page mimics a Claude-style composer so the extension can be verified
        end to end without depending on a live Claude login session.
      </p>

      <form class="composer" id="composer">
        <div
          id="editor"
          class="editor"
          data-testid="mock-editor"
          data-placeholder="Type a Claude prompt here"
          role="textbox"
          aria-label="Message Claude"
          contenteditable="true"
          spellcheck="false"
        ></div>
        <div class="toolbar">
          <div class="pill">Claude fixture surface</div>
          <button id="send" type="submit" aria-label="Send">
            Send
          </button>
        </div>
      </form>

      <section class="submitted">
        <strong>Last submitted prompt</strong>
        <div id="submitted-output" class="submitted-output"></div>
      </section>
    </main>

    <script>
      const composer = document.getElementById("composer");
      const editor = document.getElementById("editor");
      const submittedOutput = document.getElementById("submitted-output");

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        submittedOutput.textContent = editor.innerText || editor.textContent || "";
      });
    </script>
  </body>
</html>
