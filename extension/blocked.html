<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Guard Agent</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --warn: #9f1239;
        --surface: #fff1f2;
        --line: #fecdd3;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, #ffe4e6 0, transparent 42%),
          linear-gradient(160deg, #fffaf5 0%, #ffffff 55%, #fff1f2 100%);
        font: 500 16px/1.5 "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
      }

      main {
        width: min(640px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 25px 80px rgba(159, 18, 57, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.1;
      }

      p {
        margin: 0 0 14px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--surface);
        color: var(--warn);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      code {
        display: block;
        padding: 14px;
        border-radius: 14px;
        background: #111827;
        color: #f9fafb;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Guard Active</div>
      <h1>Another LLM was blocked while Claude is active.</h1>
      <p>
        AI Guard Agent restricts competing LLM sites during protected Claude sessions.
        Close Claude or wait for guard mode to return to idle before reopening this site.
      </p>
      <p>Blocked destination:</p>
      <code id="target"></code>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
